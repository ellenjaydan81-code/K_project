<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统美化控制台</title>
    <style>
        :root {
            --k-pink: #ffd1dc;
            --k-theme: #b19cd9;
            --card-bg: #ffffff;
        }

        body {
            margin: 0; padding: 20px;
            background: #fdf2f4; /* 延续你的甜酷粉底色 */
            font-family: -apple-system, sans-serif;
            color: #666;
            padding-bottom: 100px;
        }

        h2 { font-size: 20px; color: var(--k-theme); text-align: center; letter-spacing: 2px; }

        /* 实体感底座卡片 */
        .setting-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }

        .section-title {
            font-size: 15px; font-weight: 600; margin-bottom: 15px;
            display: flex; align-items: center; gap: 8px; color: var(--k-theme);
        }

        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; margin-bottom: 8px; color: #888; }

        /* 自定义上传按钮样式 */
        input[type="file"] { font-size: 12px; width: 100%; }

        /* 滑块样式 */
        input[type="range"] {
            width: 100%; height: 6px; background: #eee;
            border-radius: 5px; outline: none; accent-color: var(--k-pink);
        }

        /* 颜色选择器 */
        input[type="color"] {
            width: 100%; height: 40px; border: none; border-radius: 8px; cursor: pointer;
        }

        /* 底部保存按钮 */
        .save-btn {
            position: fixed; bottom: 30px; left: 20px; right: 20px;
            background: var(--k-pink); color: white; border: none;
            padding: 15px; border-radius: 15px; font-size: 16px; font-weight: 600;
            box-shadow: 0 5px 15px rgba(255, 209, 220, 0.5);
            cursor: pointer; transition: 0.2s;
        }
        .save-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <h2>美化控制台</h2>

    <div class="setting-card">
        <div class="section-title">🖼️ 壁纸上传</div>
        <div class="control-group">
            <label>更换锁屏背景 (Lock Screen)</label>
            <input type="file" id="lockUpload" accept="image/*">
        </div>
        <div class="control-group">
            <label>更换桌面背景 (Desktop)</label>
            <input type="file" id="deskUpload" accept="image/*">
        </div>
    </div>
<div class="control-group">
    <label>时间透明度 (Opacity: <span id="alphaVal">1.0</span>)</label>
    <input type="range" id="timeAlpha" min="0" max="1" step="0.1" value="1">
</div>

<div class="setting-card">
    <div class="section-title">📱 桌面显示</div>
    <div class="control-group">
        <label>桌面图标文字颜色 (Desktop Label Color)</label>
        <input type="color" id="deskLabelColor" value="#ffffff">
    </div>
</div>

<script>
    // 数值显示逻辑
    document.getElementById('timeAlpha').oninput = (e) => document.getElementById('alphaVal').innerText = e.target.value;

    async function saveAll() {
        const config = {
            color: document.getElementById('timeColor').value,
            size: document.getElementById('timeSize').value + 'px',
            space: document.getElementById('timeSpace').value + 'px',
            alpha: document.getElementById('timeAlpha').value, // 新增：透明度
            deskColor: document.getElementById('deskLabelColor').value // 新增：桌面颜色
        };
        localStorage.setItem('k_font_config', JSON.stringify(config));
        
        // ... 原有的背景图片保存逻辑 ...
        alert('✨ 设置已同步！');
    }
</script>
    <div class="setting-card">
        <div class="section-title">✍️ 锁屏时间美化</div>
        <div class="control-group">
            <label>时间颜色 (Color)</label>
            <input type="color" id="timeColor" value="#ffffff">
        </div>
        <div class="control-group">
            <label>字体大小 (Size: <span id="sizeVal">88</span>px)</label>
            <input type="range" id="timeSize" min="40" max="150" value="88">
        </div>
        <div class="control-group">
            <label>字间距 (Spacing: <span id="spaceVal">-2</span>px)</label>
            <input type="range" id="timeSpace" min="-15" max="30" value="-2">
        </div>
    </div>

    <button class="save-btn" onclick="saveAll()">保存并应用设置</button>

    <script>
        // 滑块实时数值显示
        const ts = document.getElementById('timeSize');
        const tsp = document.getElementById('timeSpace');
        ts.oninput = () => document.getElementById('sizeVal').innerText = ts.value;
        tsp.oninput = () => document.getElementById('spaceVal').innerText = tsp.value;

        // 核心函数：文件转Base64并保存
        async function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function saveAll() {
            // 1. 保存字体设置
            const config = {
                color: document.getElementById('timeColor').value,
                size: document.getElementById('timeSize').value + 'px',
                space: document.getElementById('timeSpace').value + 'px'
            };
            localStorage.setItem('k_font_config', JSON.stringify(config));

            // 2. 保存锁屏图
            const lockFile = document.getElementById('lockUpload').files[0];
            if(lockFile) {
                const b64 = await fileToBase64(lockFile);
                localStorage.setItem('k_lock_bg', b64);
            }

            // 3. 保存桌面图
            const deskFile = document.getElementById('deskUpload').files[0];
            if(deskFile) {
                const b64 = await fileToBase64(deskFile);
                localStorage.setItem('k_desk_bg', b64);
            }

            alert('✨ 设置已同步！返回桌面查看效果。');
        }
    </script>
</body>
</html>
